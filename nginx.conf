server {
    if ($host = www.kriptokyng.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = kriptokyng.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name kriptokyng.com www.kriptokyng.com;
    return 404; # managed by Certbot
}

